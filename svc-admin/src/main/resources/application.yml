server:
  port: 9530
  shutdown: graceful

management:
  server:
    port: 9531
  endpoint:
    health.show-details: always
  endpoints:
    web:
      exposure.include: '*'
  health:
    livenessstate.enabled: true
    readinessState.enabled: true

spring:
  application:
    name: bc-admin
  boot:
    admin:
      ui:
        title: Beancounter Admin
      monitor:
        # How often the SBA server polls each registered client's actuator.
        # 30s is gentle; raise if monitoring overhead shows up in svc-data CPU.
        period: 30s
        status-lifetime: 30s
        connect-timeout: 5s
        read-timeout: 10s
  security:
    oauth2:
      client:
        registration:
          auth0:
            # Reuses bc-view's Auth0 application — the same client-id/secret.
            # Auth0 app must list this server's callback URL alongside bc-view's:
            #   https://kauri.monowai.com:30530/login/oauth2/code/auth0
            client-id: ${AUTH0_CLIENT_ID:not-set}
            client-secret: ${AUTH0_CLIENT_SECRET:not-set}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
              - email
              - beancounter:admin
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          auth0:
            # AUTH0_DOMAIN form: beancounter.eu.auth0.com (no scheme).
            issuer-uri: https://${AUTH0_DOMAIN:beancounter.eu.auth0.com}/

beancounter:
  admin:
    client:
      # Optional static M2M bearer token for outbound /actuator/** calls used
      # ONLY when no admin has logged in since boot AND no cached user token
      # is available. Leave blank in normal operation — the OIDC-passthrough
      # provider supplies a token from the logged-in admin's session.
      bearer-token: ${BC_ADMIN_M2M_TOKEN:}

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
  level:
    root: info
    de.codecentric.boot.admin: info
    com.beancounter: info
    org.springframework.security: warn
