server:
  port: 9500
  servlet:
    context-path: '/api'
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

# Portfolio valuation scheduling (disabled by default for local dev).
# Two triggers, both opt-in:
#   - revaluation.trigger.enabled: fires ~debounce after the LAST
#     CacheInvalidationEvent (PRICE / FX) in a burst, i.e. shortly
#     after a bc-data price refresh completes.
#   - schedule.enabled + valuation.schedule: single daily cron safety
#     net (18:30 SGT, after bc-data's 07:00-18:00 SGT refresh window).
schedule:
  enabled: false
valuation:
  schedule: "0 30 18 * * Tue-Sat"
revaluation:
  trigger:
    enabled: false
    debounce: "PT10M"

springdoc:
  use-management-port: true

management:
  server:
    port: 9501
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    livenessstate:
      enabled: true
    readinessState:
      enabled: true
  info:
    git:
      mode: SIMPLE

sentry:
  enabled: false
  environment: local
  traces-sample-rate: 1
  debug: false
  # Ship ERROR-level slf4j logs as Sentry Log records (see svc-data).
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:false}
  logging:
    minimum-level: error
  # Drop the high-frequency RabbitMQ noise from the Most Frequent
  # Transactions report: AMQP basic.ack fires per consumer ack (8.9k/day),
  # the bc-perf-invalidate-demo topic fires per portfolio mutation
  # (8.4-8.5k/day). None tell us anything useful about request latency.
  # Entries are FilterString regexes.
  ignored-transactions:
    - "basic\\.ack"
    - "bc-perf-invalidate-.*"

otel:
  traces:
    exporter: none
  metrics:
    exporter: none
  logs:
    exporter: none

marketdata:
  url: "http://localhost:9510/api"
  client:
    # Bulk price valuation can be slow on cold-cache portfolios with many
    # historical gaps. 60s gives bc-data room before the coroutine bails;
    # Resilience4j @Retry on PriceService handles transient read timeouts.
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
beancounter:
  irr: 365
  valuation:
    # When false, zero-quantity positions are excluded from price requests
    includeZeroQuantity: false
auth:
  uri: "http://your-auth0-endpoint/"
  audience: "auth0-audience"
  enabled: true
  email: "${auth.audience}/claims/email"
  client-id: "not-set"
  client-secret: "not-set"

spring:
  application:
    name: bc-position
  boot:
    admin:
      client:
        # Spring Boot Admin client. Disabled by default; enabled in kauri via
        # SBA_CLIENT_ENABLED=true + SBA_SERVER_URL=http://bc-admin:9530.
        enabled: ${SBA_CLIENT_ENABLED:false}
        url: ${SBA_SERVER_URL:http://localhost:9530}
        username: ${SBA_REGISTRATION_USERNAME:admin}
        password: ${SBA_REGISTRATION_PASSWORD:}
        instance:
          management-base-url: ${MANAGEMENT_BASE_URL:http://localhost:9501}
          metadata:
            tags:
              service: bc-position
  datasource:
    url: jdbc:h2:mem:position;DB_CLOSE_DELAY=-1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${auth.uri}
      registration:
        custom:
          client-id: ${auth.client-id:not-set}
          client-secret: ${auth.client-secret}
          scope:
            - openid
            - profile
            - email
            - beancounter
            - beancounter:user
            - beancounter:system
          authorization-grant-type: client_credentials
  cloud:
    function:
      definition: performanceCacheInvalidation
    stream:
      # Switch between kafka and rabbit using environment variable:
      # SPRING_CLOUD_STREAM_DEFAULT_BINDER=kafka (or rabbit)
      default-binder: rabbit
      bindings:
        # Portfolio Market Value Producer (StreamBridge)
        portfolioMarketValue-out-0:
          destination: bc-pos-mv-dev
          content-type: application/json
        # Performance Cache Invalidation Consumer
        performanceCacheInvalidation-in-0:
          destination: bc-perf-invalidate-dev
          group: bc-position
          content-type: application/json
      # RabbitMQ-specific configuration (when default-binder=rabbit)
      rabbit:
        binder:
          connection-name-prefix: bc-position
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

  ai:
    mcp:
      server:
        name: beancounter-position
        version: 1.0.0
        type: SYNC
        stdio: false
        sse-message-endpoint: /mcp/message

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
  level:
    root: info
    javax: error
    java: error
    sun: error
    io: error
    #io.github.resilience4j: debug
    netflix: error
    jdk: error
    okhttp3: error

    com:
      netfix: error
      beancounter: debug
      zaxxer: error
    org:
      springframework: error
      springframework.web: error
      springframework.boot.actuate: error
      hibernate: error
      apache: error
      postgres: error
      postgresql: error
      flywaydb: error

    reactor: error
    com.rabbitmq: error


# Resilience4j configuration for svc-position
# Retry and circuit breaker for calls to bc-data service
resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slidingWindowSize: 20
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowType: COUNT_BASED
        waitDurationInOpenState: 30s
        registerHealthIndicator: true
        recordFailurePredicate: com.beancounter.common.exception.RecordFailurePredicate

  retry:
    configs:
      default:
        maxRetryAttempts: 3
        waitDuration: 10s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
        ignoreExceptions:
          - com.beancounter.common.exception.BusinessException
    instances:
      bcData:
        baseConfig: default
        maxRetryAttempts: 3

