server:
  port: 9530
  servlet:
    context-path: '/'
  shutdown: graceful

sentry:
  enabled: false
  environment: local
  traces-sample-rate: 1
  debug: false


marketdata:
  url: "http://localhost:9510/api"
event:
  url: "http://localhost:9520/api"
position:
  url: "http://localhost:9500/api"
retire:
  url: "http://localhost:9540/api"
rebalance:
  url: "http://localhost:9550/api"

springdoc:
  use-management-port: true

management:
  server:
    port: 9531
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure.include: '*'
  health:
    livenessstate:
      enabled: true
    readinessState:
      enabled: true
  info:
    git:
      mode: SIMPLE
  # Sample every Micrometer observation so Spring AI's gen_ai.* spans —
  # which now feed Sentry's GenAI dashboard via the OTel bridge — never
  # get dropped. Adjust per-env in application-<profile>.yaml if cost
  # becomes an issue.
  tracing:
    sampling:
      probability: 1.0
  observations:
    annotations:
      enabled: true

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
  level:
    root: debug
    javax: error
    sun: error
    netflix: error
    jdk: error

    io:
      github:
        resilience4j: error
    com:
      netfix: error
      beancounter: debug
      zaxxer: error
      github.victools: error
    org:
      springframework: error
      hibernate: error
      apache: error
      postgres: error

# Resilience4j configuration for svc-agent
# Circuit breaker and retry for calls to bc-data, bc-event, bc-position
resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 3
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        waitDurationInOpenState: 5s
        registerHealthIndicator: true
        recordFailurePredicate: com.beancounter.common.exception.RecordFailurePredicate

  retry:
    configs:
      default:
        waitDuration: 10s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
        ignoreExceptions:
          - com.beancounter.common.exception.BusinessException
    instances:
      bcData:
        baseConfig: default
      bcEvent:
        baseConfig: default
      bcPosition:
        baseConfig: default

spring:
  application:
    name: bc-agent
  boot:
    admin:
      client:
        # Spring Boot Admin client. Disabled by default; enabled in kauri via
        # SBA_CLIENT_ENABLED=true + SBA_SERVER_URL=http://bc-admin:9530.
        enabled: ${SBA_CLIENT_ENABLED:false}
        url: ${SBA_SERVER_URL:http://localhost:9530}
        username: ${SBA_REGISTRATION_USERNAME:admin}
        password: ${SBA_REGISTRATION_PASSWORD:}
        instance:
          management-base-url: ${MANAGEMENT_BASE_URL:http://localhost:9531}
          metadata:
            tags:
              service: bc-agent
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${auth.uri}
          audience: ${auth.audience}
  ai:
    # Dummy OpenAI + Ollama config to prevent autoconfiguration errors
    # (mirrors the pattern in application-ollama.yaml / application-openai.yaml)
    openai:
      api-key: "dummy-key-to-prevent-errors"
    ollama:
      base-url: "http://undefined:11434"
    anthropic:
      api-key: "${ANTHROPIC_API_KEY:}"
      base-url: "${ANTHROPIC_BASE_URL:https://api.anthropic.com}"
      chat:
        options:
          # Default / fallback model. Per-domain routing is handled by
          # ChatModelSelector — see `agent.models.*` below for the active
          # tier IDs and the page-context that escalates to SMART.
          model: "${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}"
          temperature: 0.2
          max-tokens: 4096

    model:
      chat: anthropic

# Per-tier Anthropic model IDs. ChatModelSelector picks one per call based on
# the page context (Holdings / News / Asset Review / Independence / Rebalance).
# Override per environment via ANTHROPIC_MODEL_FAST / _SMART / _DEEP.
agent:
  models:
    fast: "${ANTHROPIC_MODEL_FAST:claude-haiku-4-5-20251001}"
    smart: "${ANTHROPIC_MODEL_SMART:claude-sonnet-4-6}"
    deep: "${ANTHROPIC_MODEL_DEEP:claude-opus-4-7}"

# Security Configuration - uses same auth.* properties as all other services
# Helm sets AUTH_URI and AUTH_AUDIENCE via spring.auth template
auth:
  uri: "https://your-auth0-endpoint"
  audience: "auth0-audience"
  enabled: true
  email: "${auth.audience}/claims/email"
  web: true
