# DeepSeek profile.
#
# Uses Spring AI's native DeepSeek integration (spring-ai-starter-model-deepseek),
# which exposes DeepSeekChatModel + DeepSeekChatOptions and surfaces chain-of-
# thought via DeepSeekAssistantMessage.getReasoningContent(). Native module
# strips reasoning_content from follow-up tool messages — required by DeepSeek
# to avoid 400 errors on multi-turn tool-calling.
#
# Activate alongside an environment profile, e.g.
#
#   SPRING_PROFILES_ACTIVE=deepseek,kauri DEEPSEEK_API_KEY=sk-... \
#     ./gradlew :svc-agent:bootRun
#
# Models (DeepSeek API, current as of 2026-06):
#   deepseek-v4-flash — GA general model. Tool calling, 1M context, cheap
#                       ($0.14/$0.28 per 1M in/out). Defaults to *thinking*
#                       mode; Spring AI 2.0 has no thinking-disable toggle.
#   deepseek-v4-pro   — higher-quality tier (~3x cost). Use for the deep tier.
#   deepseek-chat / deepseek-reasoner — LEGACY aliases for v4-flash
#                       non-thinking / thinking. **Discontinued 2026-07-24** —
#                       do not configure.
#
# Spring AI 2.0 fixes the thinking-mode tool-loop bug (issue #5027): it now
# echoes `reasoning_content` back into outgoing assistant messages
# (DeepSeekChatModel.createRequest), so v4-flash/v4-pro thinking mode is safe
# for multi-turn tool calling. (Pre-2.0 it dropped reasoning_content and
# DeepSeek 400'd with "The reasoning_content in the thinking mode must be
# passed back to the API.")
spring:
  ai:
    # Provide dummy Ollama / OpenAI / Anthropic config to keep their
    # autoconfigurations from failing on missing keys. Only the deepseek
    # client is built on this profile (see ChatClientConfiguration).
    ollama:
      base-url: "http://undefined:11434"
    openai:
      api-key: "dummy-key-to-prevent-errors"
    anthropic:
      api-key: "dummy-key-to-prevent-errors"
    deepseek:
      api-key: "${DEEPSEEK_API_KEY:}"
      base-url: "${DEEPSEEK_BASE_URL:https://api.deepseek.com}"
      chat:
        options:
          model: "${DEEPSEEK_MODEL:deepseek-v4-flash}"
          temperature: 0.2
          max-tokens: 4096

    model:
      chat: deepseek

# DeepSeek model IDs per cost/quality tier. Override via env vars
# DEEPSEEK_MODEL_FAST / _SMART / _DEEP if needed.
agent:
  models:
    fast: "${DEEPSEEK_MODEL_FAST:deepseek-v4-flash}"
    smart: "${DEEPSEEK_MODEL_SMART:deepseek-v4-flash}"
    # Deep tier = v4-pro (higher quality, ~3x cost). Safe for tool calling
    # now that Spring AI 2.0 echoes reasoning_content across tool roundtrips.
    deep: "${DEEPSEEK_MODEL_DEEP:deepseek-v4-pro}"
