spring:
  ai:
    # Dummy OpenAI config to prevent autoconfiguration errors
    openai:
      api-key: "dummy-key-to-prevent-errors"
    ollama:
      base-url: "${OLLAMA_BASE_URL:http://localhost:11434}"
      chat:
        options:
          # Must be a tool-capable model. `llama3:8b` (the base llama3 release) does
          # NOT expose a tool API and Ollama rejects function calls with
          # "does not support tools". Known-good alternatives: llama3.1:8b,
          # llama3.2, qwen2.5:7b, mistral-nemo.
          model: "${OLLAMA_MODEL:llama3.1:8b}"
          temperature: 0.2
          num-predict: 2000

    model:
      chat: ollama

logging:
  level:
    org.springframework.ai: DEBUG

