server:
  port: 9510
  servlet:
    context-path: '/api'
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024
schedule:
  enabled: false

springdoc:
  use-management-port: true
  swagger-ui:
    path: /swagger-ui.html

management:
  server:
    port: 9511
  endpoint:
    health.show-details: always
  health:
    livenessstate:
      enabled: true
    readinessState:
      enabled: true
  info:
    git:
      mode: SIMPLE
  endpoints:
    web:
      exposure:
        include: "*"

sentry:
  enabled: false
  environment: local
  traces-sample-rate: .2
  debug: false
  # Ship ERROR-level slf4j logs as Sentry Log records via sentry-logback
  # appender (auto-registered by spring-boot starter). Gated by env so
  # local dev doesn't ship; kauri overrides SENTRY_LOGS_ENABLED=true.
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:false}
  logging:
    minimum-level: error
  # Drop high-frequency RabbitMQ noise from APM (see svc-position application.yml).
  ignored-transactions:
    - "basic\\.ack"
    - "bc-perf-invalidate-.*"

otel:
  traces:
    exporter: none
  metrics:
    exporter: none
  logs:
    exporter: none

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
  level:
    root: info
    javax: error
    java: error
    sun: error
    netflix: error
    jdk: error
    io:
      opentelemetry: error
      micrometer: error
      github:
        resilience4j: error
    okhttp3: error
    com:
      netfix: error
      beancounter: debug
      zaxxer: error
    org:
      aspectj: error
      springframework: error
      springframework.scheduling: info
      #springframework.security: error
      hibernate: error
      # Suppress Hibernate SQL exception logging for constraint violations
      # (handled in AssetService.create/findOrCreate catch blocks)
      hibernate.engine.jdbc.spi.SqlExceptionHelper: off
      apache: error
      postgres: error
      postgresql: error
      flywaydb: info
auth:
  uri: "https://your-auth0-endpoint"
  audience: "auth0-audience"
  enabled: true
  email: "${auth.audience}/claims/email"
  # To support interactive login via the /auth endpoint
  client: "not-set"
  client-secret: "not-set"

stream:
  enabled: true

spring:
  boot:
    admin:
      client:
        # Spring Boot Admin client. Disabled by default; enabled in kauri via
        # SBA_CLIENT_ENABLED=true + SBA_SERVER_URL=http://bc-admin:9530. See
        # svc-admin module + bc-deploy/charts/bc-admin.
        enabled: ${SBA_CLIENT_ENABLED:false}
        url: ${SBA_SERVER_URL:http://localhost:9530}
        username: ${SBA_REGISTRATION_USERNAME:admin}
        password: ${SBA_REGISTRATION_PASSWORD:}
        instance:
          management-base-url: ${MANAGEMENT_BASE_URL:http://localhost:9511}
          metadata:
            tags:
              service: bc-data
  cloud:
    function:
      definition: csvImportConsumer;trnEventConsumer;priceConsumer;portfolioConsumer
    stream:
      # Switch between kafka and rabbit using environment variable:
      # SPRING_CLOUD_STREAM_DEFAULT_BINDER=kafka (or rabbit)
      default-binder: rabbit
      bindings:
        # CSV Import Consumer
        csvImportConsumer-in-0:
          destination: bc-trn-csv-dev
          group: bc-data
          content-type: application/json
        # Transaction Event Consumer
        trnEventConsumer-in-0:
          destination: bc-trn-event-dev
          group: bc-data
          content-type: application/json
        # Price Data Consumer
        priceConsumer-in-0:
          destination: bc-price-dev
          group: bc-data
          content-type: application/json
        # Portfolio Updates Consumer
        portfolioConsumer-in-0:
          destination: bc-pos-mv-dev
          group: bc-data
          content-type: application/json
        # Corporate Event Producer (StreamBridge)
        corporateEvent-out-0:
          destination: bc-ca-event-dev
          content-type: application/json
        # Performance Cache Invalidation Producer (StreamBridge)
        cacheInvalidation-out-0:
          destination: bc-perf-invalidate-dev
          content-type: application/json
      # RabbitMQ-specific configuration (when default-binder=rabbit)
      rabbit:
        binder:
          connection-name-prefix: bc-data
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

  security:
    oauth2:
      registration:
        custom:
          client-id: ${auth.client}
          client-secret: ${auth.client-secret}
      resourceserver:
        jwt:
          issuer-uri: ${auth.uri}
  lifecycle:
    timeout-per-shutdown-phase: 10s

  application:
    name: bc-data
  cache:
    cache-names: system.user, asset.prices, asset.search, asset.mstack.search, fx.rates, provider, providers, asset.ext, currency.code, currency.all, jwt.token, auth.m2m, alpha.asset.event, eodhd.asset.event, news.sentiment, eodhd.news.sentiment, market.holidays
  flyway:
    enabled: false  # Disabled by default for H2 tests; enable in profile for PostgreSQL
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  datasource:
    hikari:
      leak-detection-threshold: 20000
  jpa:
    open-in-view: false
    generate-ddl: true
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true

  ai:
    mcp:
      server:
        name: beancounter-data
        version: 1.0.0
        type: SYNC
        stdio: false
        sse-message-endpoint: /mcp/message

# Resilience4j configuration
# Defaults are conservative for local development/free tier APIs
# Production overrides via environment variables in bc-deploy/env/kauri.yaml
resilience4j:
  ratelimiter:
    instances:
      # AlphaVantage: Premium = 75/min
      # Spread requests evenly to avoid burst-prevention at AWS/NASDAQ/NYSE
      # 1 per 800ms (75/min, no bursting) - aligned with kauri.yaml
      alphaVantage:
        registerHealthIndicator: false
        limitForPeriod: 1
        limitRefreshPeriod: 800ms
        timeoutDuration: 120s
        eventConsumerBufferSize: 200
      morningstar:
        registerHealthIndicator: false
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 60s
        eventConsumerBufferSize: 100
      # EODHD EOD Historical Data plan: 1000 req/min, 100K/day.
      # Spread requests at ~60ms cadence so we never burst into the per-minute cap.
      eodhd:
        registerHealthIndicator: false
        limitForPeriod: 1
        limitRefreshPeriod: 60ms
        timeoutDuration: 120s
        eventConsumerBufferSize: 200
      fxRates:
        registerHealthIndicator: false
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 60s
        eventConsumerBufferSize: 200
      # OpenFIGI: Free, ~250 requests/min anonymous, higher with API key
      figi:
        registerHealthIndicator: false
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 30s
        eventConsumerBufferSize: 200

  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slidingWindowSize: 20
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowType: COUNT_BASED
        waitDurationInOpenState: 30s
        registerHealthIndicator: true
        recordFailurePredicate: com.beancounter.common.exception.RecordFailurePredicate
  retry:
    instances:
      backend:
        maxRetryAttempts: 3
        waitDuration: 10s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

beancounter:
  # Default FX rate provider: FRANKFURTER (free, unlimited) or EXCHANGE_RATES_API
  fx:
    provider: EXCHANGE_RATES_API
  currency:
    base: "USD"
    values:
      - code: "GBP"
        name: "Pound"
        symbol: "£"

      - code: "USD"
        name: "Dollar"
        symbol: "$"

      - code: "NZD"
        name: "Dollar"
        symbol: "$"

      - code: "AUD"
        name: "Dollar"
        symbol: "$"

      - code: "EUR"
        name: "Euro"
        symbol: "€"

      - code: "SGD"
        name: "Dollar"
        symbol: "$"

      - code: "MYR"
        name: "Ringgit"
        symbol: "RM"

      - code: "THB"
        name: "Baht"
        symbol: "฿"

      - code: "CAD"
        name: "Dollar"
        symbol: "$"

  asset:
    categories:
      default: "EQUITY"
      values:
        - id: "EQUITY"
          name: "Equity"
        - id: "CASH"
          name: "Cash"
        - id: "ETF"
          name: "Exchange Traded Fund"
        - id: "MUTUAL FUND"
          name: "Mutual Fund"
        - id: "RE"
          name: "Real Estate"
        - id: "ACCOUNT"
          name: "Bank Account"
        - id: "TRADE"
          name: "Trade Account"
        - id: "POLICY"
          name: "Retirement Fund"
        - id: "INDEX"
          name: "Market Index"

  # Pre-seed market index assets created at startup. All routed to the
  # synthetic INDEX market. EODHD's `.INDX` exchange handles these natively
  # in the EOD plan; AlphaVantage historically required the `^GSPC`-style
  # Yahoo prefix but kauri's AV key lacks INDEX_DATA entitlement, so the
  # provider for INDEX market is opt-in per env via `eodhd.markets`.
  indices:
    values:
      - code: "GSPC"
        name: "S&P 500"
        currency: "USD"
      - code: "IXIC"
        name: "NASDAQ Composite"
        currency: "USD"
      - code: "DJI"
        name: "Dow Jones Industrial Average"
        currency: "USD"
      - code: "FTSE"
        name: "FTSE 100"
        currency: "GBP"

  # Default asset enricher - FIGI/ALPHA - can be set on a per market basis
  enricher: FIGI
  calendar:
    values:
      - day: "25"
        month: "12"
        markets:
          - "US"
          - "ASX"
          - "SGX"
      - day: "01"
        month: "01"
        markets:
          - "US"
          - "ASX"
          - "SGX"
      - day: "04"
        month: "07"
        markets:
          - "US"
  market:
    values:
      - code: "CASH"
        timezoneId: "UTC"
        enricher: "DEFAULT"
        type: "Internal"
        active: false

      - code: "PRIVATE"
        name: "Private Assets"
        timezoneId: "UTC"
        enricher: "PRIVATE"
        type: "Private"
        aliases:
          legacy: "OFFM"

      - code: "NASDAQ"
        name: "NASDAQ"
        timezoneId: "US/Eastern"
        currencyId: "USD"
        active: false
        aliases:
          SHARESIGHT: "NAS"
          FIGI: "US"
          eodhd: "US"

      - code: "NYSE"
        name: "New York Stock Exchange"
        timezoneId: "US/Eastern"
        currencyId: "USD"
        active: false
        aliases:
          SHARESIGHT: "NYS"
          FIGI: "US"
          eodhd: "US"

      - code: "AMEX"
        name: "American Stock Exchange"
        timezoneId: "US/Eastern"
        currencyId: "USD"
        active: false
        aliases:
          FIGI: "US"
          eodhd: "US"

      - code: "US"
        name: "US Market"
        timezoneId: "US/Eastern"
        currencyId: "USD"
        # Fuzzy / colloquial inputs all resolve to US so the chat agent and
        # CSV imports don't need exact knowledge of BC market conventions.
        # Aliases are matched case-insensitively after upper-casing.
        aliases:
          FIGI: "US"
          eodhd: "US"
          typo: "NASAQ"
          dow: "DOW"
          dowJones: "DOW JONES"
          arca: "ARCA"

      - code: "ASX"
        name: "Australian Securities Exchange"
        timezoneId: "Australia/Sydney"
        currencyId: "AUD"
        aliases:
          mstack: "XASX"
          sharesight: "AX"
          FIGI: "AU"
          eodhd: "AU"

      - code: "TSX"
        name: "Toronto Stock Exchange"
        timezoneId: "America/Toronto"
        currencyId: "CAD"
        aliases:
          alpha: "TRT"
          mstack: "XTSX"
          sharesight: "TO"
          FIGI: "CT"
          eodhd: "TO"

      - code: "NZX"
        name: "New Zealand Exchange"
        timezoneId: "Pacific/Auckland"
        currencyId: "NZD"
        enricher: "FIGI,MSTACK"
        aliases:
          mstack: "NZ"
          alpha: "NZ"
          FIGI: "NZ"
          # EODHD has no NZ exchange (verified via /api/exchanges-list).
          # Do not add an eodhd alias here unless the plan adds NZ coverage.

      - code: "SGX"
        name: "Singapore Exchange"
        currencyId: "SGD"
        timezoneId: "Asia/Singapore"
        enricher: "FIGI,MSTACK"
        aliases:
          mstack: "SI"
          FIGI: "SP"
          # EODHD has no SG/SES exchange (verified via /api/exchanges-list).
          # Do not add an eodhd alias here unless the plan adds SG coverage.

      - code: "LON"
        name: "London Stock Exchange"
        # UK assets priced in pence.
        currencyId: "GBP"
        timezoneId: "Europe/London"
        multiplier: 0.01
        aliases:
          mstack: "XLON"
          FIGI: "LN"
          eodhd: "LSE"

      - code: "LSE"
        name: "London Stock Exchange (USD)"
        # USD-denominated lines on the LSE — e.g. Vanguard VUAA (S&P 500 UCITS USD
        # Acc). Same physical exchange + EODHD suffix as LON, but these settle in
        # USD and are quoted whole (not pence), so currency must be USD with no
        # pence multiplier — otherwise the price is FX-converted as GBP and wrong.
        currencyId: "USD"
        timezoneId: "Europe/London"
        aliases:
          eodhd: "LSE"

      - code: "AMS"
        name: "Euronext Amsterdam"
        currencyId: "EUR"
        timezoneId: "Europe/Amsterdam"
        aliases:
          FIGI: "NA"
          # EODHD codes Euronext Amsterdam as "AS" (verified via /api/exchanges-list).
          # Useful for cross-listed ETFs (e.g. IGSG also trades on LSE in GBX).
          eodhd: "AS"

      - code: "MUTF"
        name: "Mutual Funds"
        currencyId: "GBP"
        timezoneId: "Europe/London"
        enricher: "DEFAULT"
        type: "Fund"

      - code: "INDEX"
        name: "Market Index"
        currencyId: "USD"
        timezoneId: "US/Eastern"
        enricher: "DEFAULT"
        type: "Index"
        aliases:
          eodhd: "INDX"
    # News backend selector — `alpha` (default) or `eodhd`.
    # AlphaVantage NEWS_SENTIMENT needs a Premium key in practice; EODHD's `/api/news`
    # is exposed on the free tier so operators can flip this to `eodhd` when their EODHD
    # key is set and they want to drop the AV news cost. Switching only affects the
    # `/news` endpoint surface — price/event routing is unchanged.
    news:
      provider: alpha
    providers:
      alpha:
        url: https://www.alphavantage.co
        batchSize: 1
        markets: "US,NASDAQ,AMEX,NYSE,LON,TSX"
        news:
          # Minimum per-ticker relevance_score (0.0-1.0) to keep an article.
          # Raise to narrow to only strongly-on-topic news; lower to be
          # more permissive with tangentially-related articles.
          relevance-threshold: 0.3
          # Top-N articles returned after ranking. Keep small — each article
          # becomes tool_result tokens on the LLM's second inference call.
          max-articles: 5
          # Recency window in business days (skips weekends).
          business-days-back: 5
          # How many articles to request from Alpha Vantage before ranking.
          # Larger pool means stronger ranking at no LLM cost.
          provider-limit: 50

      mstack:
        url: https://api.marketstack.com
        batchSize: 10
        markets: "NZX,SGX,ASX"

      private:
        batchSize: 1
        markets: "PRIVATE"

      morningstar:
        batchSize: 1
        markets: "MUTF"

      # EODHD — opt-in only. Empty `markets` keeps EODHD registered but unrouted,
      # so existing AlphaVantage / MarketStack / Morningstar routing is unchanged.
      # Operators enable per-env via BEANCOUNTER_MARKET_PROVIDERS_EODHD_MARKETS.
      # Plan reference: https://eodhd.com/pricing
      eodhd:
        url: https://eodhd.com
        # batchSize > 1 routes through `/api/eod-bulk-last-day/{exchange}` so the
        # nightly PortfolioValuationSchedule collapses N per-symbol round-trips
        # into a single HTTP call (per-symbol quota is unchanged at 1 call each).
        batchSize: 50
        markets: ""
        news:
          # Top-N articles returned to the caller after ranking. Keep small —
          # each article becomes tool_result tokens on the LLM's second inference call.
          max-articles: 5
          # How many articles to ask EODHD for per ticker before merging + ranking.
          provider-limit: 50
          # Per-ticker refresh interval. EODHD news endpoint quota is ~1200 req/day shared
          # with svc-agent chat lookups; default 6h ≈ 4 refreshes/day per active ticker.
          refresh-after-hours: 6
          # Articles older than this are pruned daily by NewsRetentionSchedule. Combine with
          # `schedule.enabled=true` to actually run the prune; otherwise it's a no-op bean.
          retention-days: 30

      # OpenFIGI - free, unlimited, Bloomberg-based
      figi:
        enabled: true
        # Markets that use FIGI for asset search (returns user-friendly tickers)
        # US markets use FIGI for best coverage of NYSE/NASDAQ equities
        search:
          markets: "US,NZX,SGX"

      # Frankfurter FX rates - free, unlimited, ECB-based
      frankfurter:
        url: https://api.frankfurter.app

