# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
kotlin = "2.4.0"
kotlinter = "5.5.0"
spring-boot = "4.1.0"
spring-cloud = "2025.1.2"
spring-cloud-contract = "5.0.3"
spring-data-bom = "2025.0.8"
spring-security = "6.5.10"
spring-doc = "3.0.3"
jackson = "2.21.1"
mockitoKotlin = '6.3.0'
kotest = '6.2.1'
sentry = "8.44.1"
postgres = "42.7.11"
guava = "33.6.0-jre"
servlet-api = "6.1.0"
spring-ai = "2.0.0"
flyway = "12.9.0"
# Pinned because jar-common exposes the bridge as an api dep but
# downstream modules (e.g. jar-shell) don't import the spring-boot
# platform, so version resolution falls back to the catalog.
micrometer-tracing = "1.7.0"

[libraries]
spring-boot-dependencies = { module = "org.springframework.boot:spring-boot-dependencies", version.ref = "spring-boot" }
spring-cloud-dependencies = { module = "org.springframework.cloud:spring-cloud-dependencies", version.ref = "spring-cloud" }
spring-data-bom = { module = "org.springframework.data:spring-data-bom", version.ref = "spring-data-bom" }
spring-doc = { module = "org.springdoc:springdoc-openapi-starter-webmvc-ui", version.ref = "spring-doc" }
spring-doc-mvc = { module = "org.springdoc:springdoc-openapi-starter-webmvc-api", version.ref = "spring-doc" }
spring-stub-runner = { module = "org.springframework.cloud:spring-cloud-contract-stub-runner", version.ref = "spring-cloud-contract" }
apache-groovy = { module = "org.apache.groovy:groovy", version = "5.0.6" } # stub runner importing older version
servlet-api = { module = "jakarta.servlet:jakarta.servlet-api", version.ref = "servlet-api" }
otel-bom = { module = "io.opentelemetry.instrumentation:opentelemetry-instrumentation-bom", version = "2.29.0" }
resilience4j = { module = "io.github.resilience4j:resilience4j-all", version = "2.4.0" }
resilience4j-annotations = { module = "io.github.resilience4j:resilience4j-annotations", version = "2.4.0" }
resilience4j-spring-boot3 = { module = "io.github.resilience4j:resilience4j-spring-boot4", version = "2.4.0" }
commons-io = { module = "commons-io:commons-io", version = "2.22.0" }
spring-cloud-stream = { module = "org.springframework.cloud:spring-cloud-stream" }
spring-cloud-stream-binder-rabbit = { module = "org.springframework.cloud:spring-cloud-stream-binder-rabbit" }
spring-cloud-stream-test-binder = { module = "org.springframework.cloud:spring-cloud-stream-test-binder" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "spring-boot" }
spring-boot-starter = { module = "org.springframework.boot:spring-boot-starter", version.ref = "spring-boot" }
spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "spring-boot" }
spring-boot-starter-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa", version.ref = "spring-boot" }
spring-boot-starter-logging = { module = "org.springframework.boot:spring-boot-starter-logging", version.ref = "spring-boot" }
# Boot 4.1 no longer publishes spring-boot-starter-aop; AopAutoConfiguration
# ships in spring-boot-autoconfigure and only needs aspectjweaver on the
# classpath. Alias repointed (BOM-managed version) so consumers are unchanged.
spring-boot-starter-aop = { module = "org.aspectj:aspectjweaver" }
spring-boot-starter-security = { module = "org.springframework.boot:spring-boot-starter-security", version.ref = "spring-boot" }
spring-boot-starter-actuator = { module = "org.springframework.boot:spring-boot-starter-actuator", version.ref = "spring-boot" }
spring-boot-starter-integration = { module = "org.springframework.boot:spring-boot-starter-integration", version.ref = "spring-boot" }
spring-boot-starter-webflux = { module = "org.springframework.boot:spring-boot-starter-webflux", version.ref = "spring-boot" }
spring-boot-autoconfigure = { module = "org.springframework.boot:spring-boot-autoconfigure", version.ref = "spring-boot" }
spring-boot-configuration-processor = { module = "org.springframework.boot:spring-boot-configuration-processor", version.ref = "spring-boot" }
spring-security-oauth2 = { module = "org.springframework.security:spring-security-oauth2-resource-server" }
spring-security-jose = { module = "org.springframework.security:spring-security-oauth2-jose" }
sentry-opentelemetry = { module = "io.sentry:sentry-opentelemetry-core", version.ref = "sentry" }
sentry-spring-boot = { module = "io.sentry:sentry-spring-boot-4", version.ref = "sentry" }
micrometer-tracing-bridge-otel = { module = "io.micrometer:micrometer-tracing-bridge-otel", version.ref = "micrometer-tracing" }
sentry-jdbc = { module = "io.sentry:sentry-jdbc", version.ref = "sentry" }
sentry-logback = { module = "io.sentry:sentry-logback", version.ref = "sentry" }
jackson-kotlin = { module = "tools.jackson.module:jackson-module-kotlin" }
mockito-kotlin = { module = "org.mockito.kotlin:mockito-kotlin", version.ref = "mockitoKotlin" }
assertj = { module = "org.assertj:assertj-core", version = "3.27.7" }
kotest-runner-junit5 = { module = "io.kotest:kotest-runner-junit5", version.ref = "kotest" }
kotest-assertions-core = { module = "io.kotest:kotest-assertions-core", version.ref = "kotest" }
kotest-framework-engine = { module = "io.kotest:kotest-framework-engine", version.ref = "kotest" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgres" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
spring-ai-bom = { module = "org.springframework.ai:spring-ai-bom", version.ref = "spring-ai" }
spring-ai-openai = { module = "org.springframework.ai:spring-ai-starter-model-openai", version.ref = "spring-ai" }
spring-ai-ollama = { module = "org.springframework.ai:spring-ai-starter-model-ollama", version.ref = "spring-ai" }
spring-ai-anthropic = { module = "org.springframework.ai:spring-ai-starter-model-anthropic", version.ref = "spring-ai" }
spring-ai-deepseek = { module = "org.springframework.ai:spring-ai-starter-model-deepseek", version.ref = "spring-ai" }
flyway-core = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-postgresql = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway" }

[plugins]
jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
idea = { id = "idea" }
jacoco = { id = "jacoco" }
kotlinter = { id = "org.jmailen.kotlinter", version.ref = "kotlinter" }
java-test-fixtures = { id = "java-test-fixtures" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
kotlin-jpa = { id = "org.jetbrains.kotlin.plugin.jpa", version.ref = "kotlin" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
sentry = { id = "io.sentry.jvm.gradle", version = "6.12.0" }
spring-contract = { id = "org.springframework.cloud.contract", version.ref = "spring-cloud-contract" }
git-properties = { id = "com.gorylenko.gradle-git-properties", version = "2.5.7" }
download = { id = "de.undercouch.download", version = "5.7.0" }

