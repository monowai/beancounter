version: 2.1
orbs:
  codecov: codecov/codecov@3.2.5
executors:
  java-build:
    environment:
      _JAVA_OPTIONS: "-Xms256m -Xmx512m"
      GRADLE_OPTS: "-Dorg.gradle.daemon=true"
      STACK_VER: << pipeline.number >>

    docker:
      - image: cimg/openjdk:21.0

common_steps: &common_steps
  steps:
    - add_ssh_keys:
        fingerprints:
          - "7e:93:fb:39:b3:21:f7:b6:48:bd:f7:0e:56:5c:ad:87"
    - checkout
    - restore_cache:
        keys:
          - v2-build-cache-{{ checksum "~/project/jar-common/build.gradle" }}-{{ checksum "~/project/svc-data/build.gradle" }}-{{ checksum "~/project/jar-shell/build.gradle" }}-{{ checksum "~/project/svc-position/build.gradle" }}
    - save_cache:
        paths:
          - ~/.gradle
        key: v2-build-cache-{{ checksum "~/project/jar-common/build.gradle" }}-{{ checksum "~/project/svc-data/build.gradle" }}-{{ checksum "~/project/jar-shell/build.gradle" }}-{{ checksum "~/project/svc-position/build.gradle" }}
    - save_cache:
        paths:
          - ~/.m2
          - ~/.gradle
          - ~/project
        key: v1-sha-cache-{{ .Environment.CIRCLE_SHA1 }}
    - persist_to_workspace:
        root: ~/project
        paths:
          - ./jar-common/build/reports/jacoco/test/*.xml
          - ./codecov.yml

jobs:
  build:
    executor: java-build
    resource_class: large
    environment:
      IMAGE_NAME: bc-<< matrix.name >>
    parameters:
      name:
        type: string
    <<: *common_steps
    steps:
      - run: './gradlew << parameters.name >>:build'
      - codecov/upload:
          file: ./<< parameters.name >>/build/reports/jacoco/test/jacocoTestReport.xml
      - store_artifacts:
          path: ~/project/<< parameters.name >>/build/libs

workflows:
  version: 2
  build_and_stage:
    jobs:
      - build:
          matrix:
            parameters:
              name: ["common", "client", "shell", "data", "position", "event"]
      - publish-coverage:
          filters:
            branches:
              only:
                - master
                - /^codacy.*/
          requires:
            - build
